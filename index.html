<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master PRO - AI Smart Edition</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }

        /* Navigation */
        .navbar {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .ai-badge {
            background: #f59e0b;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .container {
            padding: 25px 20px;
            max-width: 680px;
            margin: 0 auto;
        }

        /* Premium Cards */
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .formula-card { border-left-color: var(--success); background: #f0fdf4; }
        .gk-card { border-left-color: var(--primary-light); background: #f0f9ff; }

        h3 {
            margin-top: 0;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .formula-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .formula-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Quiz Box */
        .quiz-box {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            margin-top: 15px;
        }

        .question-meta {
            font-size: 0.85rem;
            color: var(--primary-light);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: var(--primary-light);
        }

        /* Dynamic Colors */
        .correct-ans { background-color: var(--success) !important; color: white !important; }
        .wrong-ans { background-color: var(--danger) !important; color: white !important; }

        .feedback-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            display: none;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }

        .bullet-list { padding-left: 20px; margin: 0; }
        .bullet-list li { margin-bottom: 8px; }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #e2e8f0;
            border-radius: 14px;
            color: #334155;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">⚡ <span>Math Master PRO</span> <span class="ai-badge">AI Engine</span></div>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">English</button>
    </div>

    <div class="container">
        <div class="card formula-card">
            <h3 id="formTitle">📐 महत्वपूर्ण गणित सूत्र (Formulas)</h3>
            <div class="formula-grid" id="formGrid"></div>
        </div>

        <!-- AI Powered Smart Quiz -->
        <div class="card">
            <h3 id="quizMainTitle">🔢 लाइव एआई अभ्यास (Unlimited Quiz)</h3>
            <div class="quiz-box">
                <div class="question-meta" id="qMeta">Topic: Loading...</div>
                <div class="question-text" id="qText">Loading AI Question...</div>
                <div class="options-container" id="optionsBox"></div>
                <div id="feedback" class="feedback-box"></div>
                <button id="nextBtn" class="action-btn" onclick="generateAIQuestion()" style="display:none;">अगला एआई प्रश्न ➡️</button>
            </div>
        </div>

        <div class="card gk-card">
            <h3 id="gkMainTitle">🗓️ रोज़ाना जीके और जॉब्स</h3>
            <ul class="bullet-list" id="gkContent"></ul>
        </div>

        <div class="footer">🐾 POWERED BY BILLU 🐾</div>
    </div>

    <script>
        let isHindi = true;
        let currentCorrectAnswer = "";

        const appContent = {
            hi: {
                formTitle: "📐 महत्वपूर्ण गणित सूत्र (Formulas)",
                formulas: [
                    "<b>प्रतिशत:</b> हिस्सा / कुल × 100",
                    "<b>लाभ (Profit):</b> विक्रय मूल्य - क्रय मूल्य",
                    "<b>हानि (Loss):</b> क्रय मूल्य - विक्रय मूल्य",
                    "<b>साधारण ब्याज:</b> (P × R × T) / 100"
                ],
                quizMainTitle: "🔢 लाइव एआई अभ्यास (Unlimited Quiz)",
                gkMainTitle: "🗓️ रोज़ाना जीके और जॉब्स",
                gk: [
                    "🆕 रेलवे RRB तकनीशियन भर्ती 2026 आवेदन चालू हैं।",
                    "🔹 RBI ने रेपो रेट को स्थिरता के साथ 6.5% पर बरकरार रखा।"
                ],
                correctMsg: "🟢 बिल्कुल सही उत्तर! शानदार काम! 🎉",
                wrongMsg: "🔴 गलत जवाब! सही उत्तर है: ",
                nextBtnTxt: "अगला एआई प्रश्न ➡️",
                topics: ["प्रतिशत (Percentage)", "लाभ और हानि (Profit & Loss)", "साधारण ब्याज (Simple Interest)"]
            },
            en: {
                formTitle: "📐 Important Math Formulas",
                formulas: [
                    "<b>Percentage:</b> Part / Total × 100",
                    "<b>Profit:</b> Selling Price - Cost Price",
                    "<b>Loss:</b> Cost Price - Selling Price",
                    "<b>Simple Interest:</b> (P × R × T) / 100"
                ],
                quizMainTitle: "🔢 AI Smart Quiz (Unlimited)",
                gkMainTitle: "🗓️ Daily GK & Job Alerts",
                gk: [
                    "🆕 Railway RRB Technician 2026 Apply Online Open.",
                    "🔹 RBI keeps Repo Rate unchanged at 6.5%."
                ],
                correctMsg: "🟢 Correct Answer! Great Job! 🎉",
                wrongMsg: "🔴 Wrong Answer! Correct answer is: ",
                nextBtnTxt: "Next AI Question ➡️",
                topics: ["Percentage", "Profit & Loss", "Simple Interest"]
            }
        };

        // --- THE AI QUESTION GENERATOR LOGIC ---
        function generateAIQuestion() {
            const topicType = Math.floor(Math.random() * 3); // Randomly choose between Percentage, Profit/Loss, SI
            let questionTextHi = "";
            let questionTextEn = "";
            let correctAnswer = 0;
            let currentTopic = "";

            if (topicType === 0) { // Percentage Question
                currentTopic = isHindi ? appContent.hi.topics[0] : appContent.en.topics[0];
                const baseNumbers = [100, 200, 300, 400, 500, 120];
                const percentages = [10, 20, 25, 50];
                const num = baseNumbers[Math.floor(Math.random() * baseNumbers.length)];
                const pct = percentages[Math.floor(Math.random() * percentages.length)];
                
                correctAnswer = (num * pct) / 100;
                questionTextHi = `Q. ${num} का ${pct}% क्या होगा?`;
                questionTextEn = `Q. What is ${pct}% of ${num}?`;

            } else if (topicType === 1) { // Profit & Loss Question
                currentTopic = isHindi ? appContent.hi.topics[1] : appContent.en.topics[1];
                const cp = [100, 200, 500, 1000][Math.floor(Math.random() * 4)];
                const profitPct = [10, 20, 25, 50][Math.floor(Math.random() * 4)];
                
                const profitAmount = (cp * profitPct) / 100;
                correctAnswer = cp + profitAmount; // Selling Price
                questionTextHi = `Q. एक वस्तु का क्रय मूल्य (Cost Price) ₹${cp} है। यदि इसे ${profitPct}% लाभ पर बेचा जाए, तो विक्रय मूल्य (Selling Price) क्या होगा?`;
                questionTextEn = `Q. The Cost Price of an item is ₹${cp}. If it is sold at a profit of ${profitPct}%, what is its Selling Price?`;

            } else { // Simple Interest Question
                currentTopic = isHindi ? appContent.hi.topics[2] : appContent.en.topics[2];
                const principal = [1000, 2000, 5000][Math.floor(Math.random() * 3)];
                const rate = [5, 10][Math.floor(Math.random() * 2)];
                const time = [2, 3][Math.floor(Math.random() * 2)];

                correctAnswer = (principal * rate * time) / 100;
                questionTextHi = `Q. ₹${principal} का ${rate}% वार्षिक दर से ${time} वर्ष का साधारण ब्याज (Simple Interest) कितना होगा?`;
                questionTextEn = `Q. What will be the Simple Interest on ₹${principal} at a rate of ${rate}% per annum for ${time} years?`;
            }

            currentCorrectAnswer = correctAnswer.toString();

            // Options mixing
            let optionsSet = new Set([currentCorrectAnswer]);
            while(optionsSet.size < 4) {
                let wrongOpt = correctAnswer + (Math.floor(Math.random() * 4) + 1) * (Math.random() > 0.5 ? 5 : -5);
                if(wrongOpt > 0) optionsSet.add(wrongOpt.toString());
            }

            let optionsArray = Array.from(optionsSet).sort(() => Math.random() - 0.5);

            // Render to UI
            document.getElementById('qMeta').innerText = "AI Topic: " + currentTopic;
            document.getElementById('qText').innerText = isHindi ? questionTextHi : questionTextEn;

            let optionsHtml = '';
            optionsArray.forEach(opt => {
                optionsHtml += `<button class="option-btn" onclick="handleOptionClick(this, '${opt}')">${opt}</button>`;
            });
            document.getElementById('optionsBox').innerHTML = optionsHtml;

            // Reset layouts
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function handleOptionClick(btn, selectedOpt) {
            const feedback = document.getElementById('feedback');
            const lang = isHindi ? 'hi' : 'en';
            const allButtons = document.querySelectorAll('.option-btn');
            
            allButtons.forEach(b => b.disabled = true);
            feedback.style.display = 'block';

            if (selectedOpt === currentCorrectAnswer) {
                btn.classList.add('correct-ans');
                feedback.style.backgroundColor = '#d1fae5';
                feedback.style.color = '#065f46';
                feedback.innerText = appContent[lang].correctMsg;
            } else {
                btn.classList.add('wrong-ans');
                feedback.style.backgroundColor = '#fee2e2';
                feedback.style.color = '#991b1b';
                feedback.innerText = appContent[lang].wrongMsg + " " + currentCorrectAnswer;
                
                allButtons.forEach(b => {
                    if (b.innerText === currentCorrectAnswer) b.classList.add('correct-ans');
                });
            }

            document.getElementById('nextBtn').style.display = 'block';
        }

        function renderStaticUI() {
            const lang = isHindi ? 'hi' : 'en';
            document.getElementById('langBtn').innerText = isHindi ? 'English' : 'Hindi';
            document.getElementById('formTitle').innerText = appContent[lang].formTitle;
            document.getElementById('quizMainTitle').innerText = appContent[lang].quizMainTitle;
            document.getElementById('gkMainTitle').innerText = appContent[lang].gkMainTitle;
            document.getElementById('nextBtn').innerText = appContent[lang].nextBtnTxt;

            let formHtml = '';
            appContent[lang].formulas.forEach(f => { formHtml += `<div class="formula-item">${f}</div>`; });
            document.getElementById('formGrid').innerHTML = formHtml;

            let gkHtml = '';
            appContent[lang].gk.forEach(g => { gkHtml += `<li>${g}</li>`; });
            document.getElementById('gkContent').innerHTML = gkHtml;
        }

        function toggleLanguage() {
            isHindi = !isHindi;
            renderStaticUI();
            generateAIQuestion();
        }

        // Init Setup
        renderStaticUI();
        generateAIQuestion();
    </script>
</body>
</html>
