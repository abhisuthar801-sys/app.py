<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master PRO - AI Grand Solution Edition</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 10px;}
        .ai-badge { background: #f59e0b; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: bold; }
        .lang-btn { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 18px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .container { padding: 25px 20px; max-width: 680px; margin: 0 auto; }
        
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .formula-card { border-left-color: var(--success); background: #f0fdf4; }
        .solution-card { border-left-color: #a855f7; background: #faf5ff; display: none; margin-top: 15px; animation: fadeIn 0.3s ease;}

        .topic-dropdown { width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700; border: 2px solid #cbd5e1; border-radius: 12px; background-color: white; color: var(--primary); outline: none; cursor: pointer; }
        .quiz-box { background: #fafafa; padding: 20px; border-radius: 12px; border: 1px dashed #cbd5e1; }
        .question-meta { font-size: 0.85rem; color: var(--primary-light); font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .question-text { font-size: 1.25rem; font-weight: 700; color: var(--dark); margin-bottom: 20px; line-height: 1.6; }
        
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn { padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #ffffff; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { background: #f1f5f9; border-color: var(--primary-light); }
        
        .correct-ans { background-color: var(--success) !important; color: white !important; }
        .wrong-ans { background-color: var(--danger) !important; color: white !important; }

        .feedback-box { margin-top: 15px; padding: 14px; border-radius: 10px; font-weight: 700; display: none; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn { background-color: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; flex: 1; font-size: 1rem; }
        .sol-btn { background-color: #a855f7; color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; flex: 1; font-size: 1rem; display: none; }
        .sol-btn:hover { background-color: #9333ea; }
        
        .formula-display { font-size: 1.1rem; line-height: 1.7; color: #166534; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 10px; border: 1px solid #bbf7d0; }
        .sol-display { font-size: 1.05rem; line-height: 1.8; color: #581c87; }
        
        .footer { text-align: center; margin-top: 40px; padding: 20px; background: #e2e8f0; border-radius: 14px; color: #334155; font-weight: 800; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">⚡ <span>Math Master PRO</span> <span class="ai-badge">AI Solver v4</span></div>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">English</button>
    </div>

    <div class="container">
        <!-- 1. Topic Dropdown Menu -->
        <div class="card" style="border-left-color: var(--primary-light);">
            <h3 id="selectLabel">🎯 अभ्यास का विषय चुनें (Select Topic):</h3>
            <select class="topic-dropdown" id="topicSelect" onchange="onTopicChange()">
                <!-- Populated Dynamically -->
            </select>
        </div>

        <!-- 2. AI Quiz Core Box -->
        <div class="card">
            <h3 id="quizMainTitle">🔢 लाइव एआई अभ्यास (Infinite Quiz)</h3>
            <div class="quiz-box">
                <div class="question-meta" id="qMeta">Topic: Loading...</div>
                <div class="question-text" id="qText">Generating AI Question...</div>
                <div class="options-container" id="optionsBox"></div>
                <div id="feedback" class="feedback-box"></div>
                
                <!-- Buttons Row -->
                <div class="btn-group">
                    <button id="solBtn" class="sol-btn" onclick="toggleSolutionView()">💡 Solution & Trick</button>
                    <button id="nextBtn" class="action-btn" onclick="generateAIQuestion()" style="display:none;">अगला एआई प्रश्न ➡️</button>
                </div>

                <!-- 3. Dynamic Solution Card inside the Quiz Box for slick look -->
                <div class="card solution-card" id="solCard">
                    <h4 style="margin:0 0 10px 0; color:#6b21a8;" id="solHeading">💡 एआई व्याख्या (AI Explanation):</h4>
                    <div class="sol-display" id="solContent">Solution text...</div>
                </div>
            </div>
        </div>

        <!-- 4. Real-time Topic Formula Display -->
        <div class="card formula-card">
            <h3 id="formTitle">📐 इस विषय के महत्वपूर्ण सूत्र (Topic Formulas)</h3>
            <div class="formula-display" id="formulaContent">Loading Formula...</div>
        </div>

        <div class="footer">🐾 POWERED BY BILLU 🐾</div>
    </div>

    <script>
        let isHindi = true;
        let currentCorrectAnswer = "";
        let generatedSolution = { hi: "", en: "" };

        const appData = {
            hi: {
                selectLabel: "🎯 अभ्यास का विषय चुनें (Select Topic):",
                quizMainTitle: "🔢 लाइव एआई अभ्यास (Infinite Quiz)",
                formTitle: "📐 इस विषय के महत्वपूर्ण सूत्र (Topic Formulas)",
                correctMsg: "🟢 बिल्कुल सही उत्तर! शानदार काम! 🎉",
                wrongMsg: "🔴 गलत जवाब! सही उत्तर है: ",
                nextBtnTxt: "अगला एआई प्रश्न ➡️",
                solBtnTxt: "💡 व्याख्या और ट्रिक",
                topics: [
                    { name: "1. प्रतिशत (Percentage)", formula: "• प्रतिशत (%) = (हिस्सा / कुल) × 100<br>• संख्या में वृद्धि = मूल संख्या × (100 + वृद्धि%) / 100" },
                    { name: "2. लाभ और हानि (Profit & Loss)", formula: "• लाभ = विक्रय मूल्य (SP) - क्रय मूल्य (CP)<br>• हानि = क्रय मूल्य (CP) - विक्रय मूल्य (SP)" },
                    { name: "3. साधारण ब्याज (Simple Interest)", formula: "• साधारण ब्याज (SI) = (मूलधन [P] × दर [R] × समय [T]) / 100" },
                    { name: "4. औसत (Average)", formula: "• औसत (Average) = दी गई संख्याओं का कुल योग / कुल संख्याओं की संख्या" },
                    { name: "5. अनुपात (Ratio)", formula: "• अनुपात दो भागों की परस्पर तुलना को सरलतम भिन्न रूप में दर्शाता है।" },
                    { name: "6. संख्या और वर्ग (Numbers & Squares)", formula: "• वर्ग (Square) = संख्या × स्वयं वही संख्या (X<sup>2</sup>)" }
                ]
            },
            en: {
                selectLabel: "🎯 Choose Topic for Practice:",
                quizMainTitle: "🔢 AI Smart Quiz (Infinite)",
                formTitle: "📐 Vital Formulas for Current Topic",
                correctMsg: "🟢 Correct Answer! Great Job! 🎉",
                wrongMsg: "🔴 Wrong Answer! Correct answer is: ",
                nextBtnTxt: "Next AI Question ➡️",
                solBtnTxt: "💡 Solution & Trick",
                topics: [
                    { name: "1. Percentage", formula: "• Percentage (%) = (Part / Total) × 100" },
                    { name: "2. Profit & Loss", formula: "• Profit = Selling Price (SP) - Cost Price (CP)<br>• Loss = Cost Price (CP) - Selling Price (SP)" },
                    { name: "3. Simple Interest", formula: "• Simple Interest (SI) = (P × R × T) / 100" },
                    { name: "4. Average", formula: "• Average = Sum of all values / Total number of values" },
                    { name: "5. Ratio", formula: "• Ratio is the simplest fraction form comparing two components." },
                    { name: "6. Numbers & Squares", formula: "• Square = Number × Itself (X<sup>2</sup>)" }
                ]
            }
        };

        function populateDropdown() {
            const select = document.getElementById('topicSelect');
            const lang = isHindi ? 'hi' : 'en';
            const previousValue = select.value || "0";

            select.innerHTML = '';
            appData[lang].topics.forEach((topic, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerText = topic.name;
                if(index.toString() === previousValue) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function onTopicChange() {
            const selectValue = parseInt(document.getElementById('topicSelect').value || "0");
            const lang = isHindi ? 'hi' : 'en';
            document.getElementById('formulaContent').innerHTML = appData[lang].topics[selectValue].formula;
            generateAIQuestion();
        }

        function generateAIQuestion() {
            const selectValue = parseInt(document.getElementById('topicSelect').value || "0");
            const lang = isHindi ? 'hi' : 'en';
            
            let qHi = "", qEn = "", ans = 0;
            let topicName = appData[lang].topics[selectValue].name;

            // Hide previous solution card instantly
            document.getElementById('solCard').style.display = 'none';

            switch(selectValue) {
                case 0: // Percentage
                    let base = [100, 200, 300, 500, 150][Math.floor(Math.random() * 5)];
                    let pVal = [10, 20, 25, 50][Math.floor(Math.random() * 4)];
                    ans = (base * pVal) / 100;
                    qHi = `Q. ${base} का ${pVal}% कितना होगा?`; 
                    qEn = `Q. What is ${pVal}% of ${base}?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> (${base} × ${pVal}) / 100 = ${ans}<br><b>AI शार्ट ट्रिक:</b> सीधा 10% निकालें या भिन्न (Fraction) बदलें। जैसे 25% का मतलब चौथा हिस्सा होता है (${base} / 4 = ${ans})।`;
                    generatedSolution.en = `<b>Formula Method:</b> (${base} × ${pVal}) / 100 = ${ans}<br><b>AI Short Trick:</b> Convert percentage to basic fraction. Since 25% means 1/4th of any number, simply do ${base} / 4 = ${ans}.`;
                    break;

                case 1: // Profit & Loss
                    let cost = [200, 400, 500, 1000][Math.floor(Math.random() * 4)];
                    let pPct = [10, 20, 50][Math.floor(Math.random() * 3)];
                    let profitAmt = (cost * pPct / 100);
                    ans = cost + profitAmt;
                    qHi = `Q. एक वस्तु का क्रय मूल्य ₹${cost} है। यदि इसे ${pPct}% लाभ पर बेचा जाए, तो विक्रय मूल्य (Selling Price) क्या होगा?`;
                    qEn = `Q. The Cost Price of an item is ₹${cost}. If sold at a ${pPct}% profit, find its Selling Price?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> SP = CP × (100 + लाभ%) / 100 = ${cost} × (100 + ${pPct}) / 100 = ${ans}<br><b>AI शार्ट ट्रिक:</b> ₹${cost} का सीधे ${pPct}% मन में निकालें (जो कि ₹${profitAmt} है) और उसे मूल मूल्य में जोड़ दें (${cost} + ${profitAmt} = ${ans})।`;
                    generatedSolution.en = `<b>Formula Method:</b> SP = CP × (100 + Profit%) / 100 = ${cost} × (100 + ${pPct}) / 100 = ${ans}<br><b>AI Short Trick:</b> Calculate ${pPct}% of ₹${cost} mentally (which is ₹${profitAmt}) and add it to original price (${cost} + ${profitAmt} = ${ans}).`;
                    break;

                case 2: // Simple Interest
                    let p = [1000, 2000, 5000][Math.floor(Math.random() * 3)];
                    let r = [5, 10][Math.floor(Math.random() * 2)];
                    let t = [2, 3][Math.floor(Math.random() * 2)];
                    ans = (p * r * t) / 100;
                    qHi = `Q. ₹${p} का ${r}% वार्षिक दर से ${t} वर्ष का साधारण ब्याज (SI) क्या होगा?`;
                    qEn = `Q. Calculate Simple Interest on ₹${p} at a ${r}% rate per annum for ${t} years?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> SI = (P × R × T) / 100 = (${p} × ${r} × ${t}) / 100 = ${ans}<br><b>AI शार्ट ट्रिक:</b> दर और समय का आपस में गुणा कर लें (${r}% × ${t} = ${r*t}%)। अब सीधे मूलधन का ${r*t}% निकालें, उत्तर बिना पेन के आ जाएगा।`;
                    generatedSolution.en = `<b>Formula Method:</b> SI = (P × R × T) / 100 = (${p} × ${r} × ${t}) / 100 = ${ans}<br><b>AI Short Trick:</b> Multiply Rate and Time directly (${r}% × ${t} = ${r*t}%). Now just extract ${r*t}% of principal amount instantly.`;
                    break;

                case 4: // Ratio
                    let multiplier = Math.floor(Math.random() * 8) + 2;
                    ans = 4 * multiplier;
                    let totalVal = 7 * multiplier;
                    qHi = `Q. ₹${totalVal} को दो भागों में 3:4 के अनुपात में बांटा जाता है। बड़ा भाग कितना होगा?`;
                    qEn = `Q. ₹${totalVal} is split into 3:4 ratio. What is the value of the larger part?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> कुल अनुपात भाग = 3 + 4 = 7 भाग। इसलिए 1 भाग = ${totalVal} / 7 = ${multiplier}। बड़ा भाग (4 भाग) = 4 × ${multiplier} = ${ans}<br><b>AI शार्ट ट्रिक:</b> कुल राशि अनुपात के कुल योग (7) का गुणांक है। सीधे देखें 7 बराबर ${totalVal} तो 4 बराबर ${ans}।`;
                    generatedSolution.en = `<b>Formula Method:</b> Total units = 3 + 4 = 7 units. Therefore, 1 unit = ${totalVal} / 7 = ${multiplier}. Larger part (4 units) = 4 × ${multiplier} = ${ans}<br><b>AI Short Trick:</b> Check 7 units = ${totalVal}, so 1 unit is clearly ${multiplier}. Multiply directly by 4 to get ${ans}.`;
                    break;

                case 3: // Average
                    let a1 = Math.floor(Math.random() * 15) + 5; let a2 = a1 + 5; let a3 = a1 + 10;
                    ans = (a1 + a2 + a3) / 3;
                    qHi = `Q. संख्याओं ${a1}, ${a2}, और ${a3} का औसत (Average) क्या होगा?`;
                    qEn = `Q. What is the average of numbers: ${a1}, ${a2}, and ${a3}?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> कुल योग / कुल संख्या = (${a1} + ${a2} + ${a3}) / 3 = ${ans}<br><b>AI शार्ट ट्रिक:</b> जब संख्याओं के बीच का अंतर समान हो (जैसे यहाँ 5 का गैप है), तो हमेशा **बीच वाली संख्या** ही डायरेक्ट औसत (Average) होती है। यहाँ बिना जोड़े सीधे उत्तर ${ans} है।`;
                    generatedSolution.en = `<b>Formula Method:</b> Sum / Count = (${a1} + ${a2} + ${a3}) / 3 = ${ans}<br><b>AI Short Trick:</b> When consecutive numbers have an equal difference gap, the **middle number** is always the average. No need to calculate! Result is instantly ${ans}.`;
                    break;

                case 5: // Numbers & Squares
                default:
                    let num = Math.floor(Math.random() * 10) + 6; // 6-15
                    ans = num * num;
                    qHi = `Q. संख्या ${num} का वर्ग (Square) कितना होता है?`;
                    qEn = `Q. What is the square of the number ${num}?`;
                    
                    generatedSolution.hi = `<b>सूत्र विधि:</b> ${num} × ${num} = ${ans}<br><b>AI शार्ट ट्रिक:</b> 1 से 25 तक के वर्ग हमेशा जबानी याद रखें ताकि परीक्षा में गुणा करने का कीमती समय बच सके।`;
                    generatedSolution.en = `<b>Formula Method:</b> ${num} × ${num} = ${ans}<br><b>AI Short Trick:</b> Always memorize squares up to 25 to save time during competitive exams.`;
                    break;
            }

            currentCorrectAnswer = ans.toString();

            // Set dynamic answers distribution
            let opSet = new Set([currentCorrectAnswer]);
            while(opSet.size < 4) {
                let dev = (Math.floor(Math.random() * 3) + 1) * (Math.random() > 0.5 ? 2 : -2);
                let wVal = ans + dev;
                if(wVal >= 0) opSet.add(wVal.toString());
            }

            let opArr = Array.from(opSet).sort(() => Math.random() - 0.5);

            document.getElementById('qMeta').innerText = "AI Module: " + topicName;
            document.getElementById('qText').innerText = isHindi ? qHi : qEn;

            let opHtml = '';
            opArr.forEach(opt => {
                opHtml += `<button class="option-btn" onclick="handleOptionClick(this, '${opt}')">${opt}</button>`;
            });
            document.getElementById('optionsBox').innerHTML = opHtml;

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('solBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function handleOptionClick(btn, selectedOpt) {
            const feedback = document.getElementById('feedback');
            const lang = isHindi ? 'hi' : 'en';
            const allButtons = document.querySelectorAll('.option-btn');
            
            allButtons.forEach(b => b.disabled = true);
            feedback.style.display = 'block';

            if (selectedOpt === currentCorrectAnswer) {
                btn.classList.add('correct-ans');
                feedback.style.backgroundColor = '#d1fae5';
                feedback.style.color = '#065f46';
                feedback.innerText = appData[lang].correctMsg;
            } else {
                btn.classList.add('wrong-ans');
                feedback.style.backgroundColor = '#fee2e2';
                feedback.style.color = '#991b1b';
                feedback.innerText = appData[lang].wrongMsg + " " + currentCorrectAnswer;
                
                allButtons.forEach(b => {
                    if (b.innerText === currentCorrectAnswer) b.classList.add('correct-ans');
                });
            }
            
            // Show action buttons
            document.getElementById('solBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
            
            // Inject content to solution box
            document.getElementById('solContent').innerHTML = isHindi ? generatedSolution.hi : generatedSolution.en;
        }

        function toggleSolutionView() {
            const card = document.getElementById('solCard');
            if(card.style.display === 'block') {
                card.style.display = 'none';
            } else {
                card.style.display = 'block';
            }
        }

        function renderStaticUI() {
            const lang = isHindi ? 'hi' : 'en';
            document.getElementById('langBtn').innerText = isHindi ? 'English' : 'Hindi';
            document.getElementById('selectLabel').innerText = appData[lang].selectLabel;
            document.getElementById('quizMainTitle').innerText = appData[lang].quizMainTitle;
            document.getElementById('formTitle').innerText = appData[lang].formTitle;
            document.getElementById('solBtn').innerText = appData[lang].solBtnTxt;
            document.getElementById('nextBtn').innerText = appData[lang].nextBtnTxt;

            populateDropdown();
            const selectValue = parseInt(document.getElementById('topicSelect').value || "0");
            document.getElementById('formulaContent').innerHTML = appData[lang].topics[selectValue].formula;
        }

        function toggleLanguage() {
            isHindi = !isHindi;
            renderStaticUI();
            generateAIQuestion();
        }

        // Initialize App
        renderStaticUI();
        generateAIQuestion();
    </script>
</body>
</html>
